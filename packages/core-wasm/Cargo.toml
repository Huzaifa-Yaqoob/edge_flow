[package]
name = "core-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.92"
image = { version = "0.25", features = ["webp"] }
vtracer = "0.6"
serde-wasm-bindgen = "0.6"
regex = "1.10"
# Added for error handling and logging in the browser console
console_error_panic_hook = "0.1.7"
js-sys = "0.3.69"
lopdf = "0.40.0"
simd-json = "0.13"
serde = { version = "1.0.228", features = ["derive"] }

# This is the "Force" move.
# By declaring it here with the correct feature,
# you override the sub-dependency's default settings.
getrandom = { version = "0.4.2", features = ["wasm_js"] }

[profile.release]
# This makes the .wasm file much smaller
opt-level = "s"
lto = true
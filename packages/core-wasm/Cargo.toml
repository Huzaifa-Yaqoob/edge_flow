[package]
name = "core-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.92"
# Added for error handling and logging in the browser console
console_error_panic_hook = "0.1.7"
js-sys = "0.3.69"

[profile.release]
# This makes the .wasm file much smaller
opt-level = "s"
lto = true
